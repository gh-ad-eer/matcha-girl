
<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>matcha girl shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <style>
    body {
      background-color:rgb(155, 210, 155);
      direction: rtl;
      font-family: 'Tahoma', sans-serif;
    }
    .product-card img {
      height: 200px;
      object-fit: cover;
      border-radius: 0.5rem;
    }
    .buy-btn {
      background-color: rgb(53, 70, 59);
      color:beige;
    }
    .buy-btn:hover {
      background-color:green;
    }
  </style>
</head>
<body>

  <div class="container py-5">
    <h1 style="color: beige;text-align: center;padding: 10px;"> *matcha girl welcomes you* </h1>
    <div class="d-flex justify-content-end mb-3">
  <h5>🛒 Cart: <span id="cart-count">0</span></h5>
</div>
<br>
    <div class="row g-4">
      
      <!-- منتج 1 -->
      <div class="col-md-4">
        <div class="card product-card shadow-sm">
          <img src="matchathing.jpg" class="card-img-top" alt="Product 1">
          <div class="card-body text-center">
            <h5 class="card-title">Matcha tools</h5>
            <p class="card-text text-success">150 RS</p>
            <button class="btn buy-btn add-to-cart">Add to cart</button>
          </div>
        </div>
      </div>

      <!-- منتج 2 -->
      <div class="col-md-4">
        <div class="card product-card shadow-sm">
          <img src="matcha300gram.jpg" class="card-img-top" alt="Product 2">
          <div class="card-body text-center">
            <h5 class="card-title">30g of matcha</h5>
            <p class="card-text text-success">80 RS</p>
            <button class="btn buy-btn add-to-cart">Add to cart</button>
          </div>
        </div>
      </div>

      <!-- منتج 3 -->
      <div class="col-md-4">
        <div class="card product-card shadow-sm">
          <img src="seropvvaanniillaa.jpg" class="card-img-top" alt="Product 3">
          <div class="card-body text-center">
            <h5 class="card-title">Vanilla syrup </h5>
            <p class="card-text text-success">40 RS</p>
            <button class="btn buy-btn add-to-cart">Add to cart</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Bootstrap JS (اختياري إن كنتي ما راح تستخدمين مكونات JavaScript مثل المودال) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>

let cartCount = 0;

const buttons = document.querySelectorAll(".add-to-cart");
const cartDisplay = document.getElementById("cart-count");

buttons.forEach(button => {
  button.addEventListener("click", () => {
    
    cartCount++;
    cartDisplay.textContent = cartCount;

    alert("تمت إضافة المنتج إلى السلة 🛒");

  });
});

</script>
</body>
</html>
